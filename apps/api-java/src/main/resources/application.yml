server:
  port: 8081

spring:
  application:
    name: aiwear-service

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  # MySQL数据源配置
  datasource:
    url: "${MYSQL_URL:jdbc:mysql://localhost:3307/bite_wear}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8"
    username: ${MYSQL_USER:bite}
    password: ${MYSQL_PASSWORD:bite@123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  # Redis配置
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
      database: 0
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

  # 邮件配置
  mail:
    host: smtp.qq.com
    port: 587
    username: ${SMTP_USERNAME:3422105661@qq.com}
    password: ${SMTP_PASSWORD:wkazfrkwimlncicj} # 授权码
    protocol: smtp
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory

# MyBatis-Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 开启驼峰命名转换
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto # 主键自增

jwt:
  secret: ${JWT_SECRET:abcdefghijklmnopqrstuvwxyz123456}
  expiration: 2

app:
  public-url: ${APP_PUBLIC_URL:http://127.0.0.1:8081}

file:
  upload:
    dir: ${UPLOAD_DIR:../../data/uploads}
    resource-locations: ${UPLOAD_RESOURCE_LOCATIONS:file:../../data/uploads/}

python:
  service:
    base-url: ${PYTHON_SERVICE_URL:http://127.0.0.1:5001}

# 阿里云 OSS 配置（可选：不配则使用本地存储）
oss:
  endpoint: oss-cn-beijing.aliyuncs.com
  access-key-id: ${OSS_ACCESS_KEY:}
  access-key-secret: ${OSS_ACCESS_SECRET:}
  bucket: bitehouse-file
  cname-domain:

# 自定义日志配置
logging:
  pattern:
    console: "%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){cyan} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"