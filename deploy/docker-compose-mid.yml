#启动命令 docker compose -p bite_wear -f docker-compose-mid.yml up -d
services:
  bite_wear-mysql:
    container_name: bite_wear-mysql
    image: mysql:8.4.2
    ports:
      - "3307:3306"
    volumes:
      - ../data/bite_wear/mysql/data:/var/lib/mysql
      - ./mysql/init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/sql:/opt/sql
    command: [
      'mysqld',
      '--innodb-buffer-pool-size=80M',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-time-zone=+8:00',
      '--lower-case-table-names=1',
      '--explicit_defaults_for_timestamp=true',
      '--server-id=1',
      '--log-bin=mysql-bin',
      '--binlog-ignore-db=mysql',
      '--binlog-cache-size=256M',
      '--binlog-format=ROW',
      '--max_connections=2000'
    ]
    restart: always
    networks:
      - bite_wear_network
    healthcheck:
      test: mysql --user=bite -h127.0.0.1 --password='bite@123' -e "SELECT 1;"
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: bite@123
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000

  bite_wear-redis:
    container_name: bite_wear-redis
    image: redis:7.0.15
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf
      - ../data/bite_wear/redis/data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - bite_wear_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10

  bite_wear-rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bite_wear-rabbitmq
    restart: always
    networks:
      - bite_wear_network
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ../data/bite_wear/rabbitmq/data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: aiwear
      RABBITMQ_DEFAULT_PASS: aiwear@mq
      RABBITMQ_DEFAULT_VHOST: /
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Application Services ──

  aiwear-python:
    container_name: aiwear-python
    build:
      context: ../apps/ai-service
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    environment:
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - FAISS_INDEX_PATH=/data/faiss_index
      - RAG_KNOWLEDGE_DIR=/data/knowledge
      - REDIS_HOST=bite_wear-redis
      - PYTHON_SERVICE_URL=http://aiwear-python:5001
    volumes:
      - ../data/faiss_index:/data/faiss_index
      - ../data/knowledge:/data/knowledge
    restart: always
    networks:
      - bite_wear_network
    depends_on:
      bite_wear-redis:
        condition: service_healthy

  aiwear-java:
    container_name: aiwear-java
    build:
      context: ../apps/api-java
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    environment:
      - MYSQL_URL=jdbc:mysql://bite_wear-mysql:3306/bite_wear?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=utf8
      - MYSQL_USER=bite
      - MYSQL_PASSWORD=bite@123
      - REDIS_HOST=bite_wear-redis
      - PYTHON_SERVICE_URL=http://aiwear-python:5001
      - APP_PUBLIC_URL=http://localhost:8081
      - JWT_SECRET=${JWT_SECRET:-change-me-in-production}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - UPLOAD_DIR=/data/uploads
      - UPLOAD_RESOURCE_LOCATIONS=file:/data/uploads/
    volumes:
      - ../data/uploads:/data/uploads
    restart: always
    networks:
      - bite_wear_network
    depends_on:
      bite_wear-mysql:
        condition: service_healthy
      aiwear-python:
        condition: service_started

networks:
  bite_wear_network:
