version: '3.8'
#启动命令 docker compose -p bite_wear -f docker-compose-mid.yml up -d
services:
  bite_wear-mysql:
    container_name: bite_wear-mysql
    image: mysql:8.4.2
    ports:
      - "3307:3306"
    volumes:
      # 数据挂载
      - ../data/bite_wear/mysql/data:/var/lib/mysql
      # 配置挂载
      - ./mysql/init/init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/sql:/opt/sql
    command: [
      'mysqld',
      '--innodb-buffer-pool-size=80M',
      '--character-set-server=utf8mb4',
      '--collation-server=utf8mb4_unicode_ci',
      '--default-time-zone=+8:00',
      '--lower-case-table-names=1',
      '--explicit_defaults_for_timestamp=true',
      '--server-id=1',
      '--log-bin=mysql-bin',
      '--binlog-ignore-db=mysql',
      '--binlog-cache-size=256M',
      '--binlog-format=ROW',
      '--max_connections=2000'
    ]
    restart: always
    networks:
      - bite_wear_network
    healthcheck:
      test: mysql --user=bite -h127.0.0.1 --password='bite@123' -e "SELECT 1;"
      start_period: 30s
      interval: 10s
      timeout: 5s
      retries: 10
    environment:
      TZ: Asia/Shanghai
      MYSQL_ROOT_PASSWORD: bite@123
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000
  bite_wear-redis:
    container_name: bite_wear-redis
    image: redis:7.0.15
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/usr/local/etc/redis/redis.conf
      - ../data/bite_wear/redis/data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    restart: always
    networks:
      - bite_wear_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 10
  bite_wear-web:
    image: nginx:1.24.0
    container_name: bite_wear-web
    restart: always
    networks:
      - bite_wear_network
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ../apps/web/dist:/data/bite_wear/web/dist
    ulimits:
      nproc: 65535
      nofile:
        soft: 20000
        hard: 40000
networks:
  bite_wear_network: