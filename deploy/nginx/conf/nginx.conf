worker_processes auto;
worker_cpu_affinity auto;
# 最大打开文件数，可设置为系统优化后的ulimit -HSn的结果，调整系统文件描述和这个问题有相同之处
# 需要调整系统打开文件数量
worker_rlimit_nofile 65535;

events {
    use epoll;
    worker_connections  10000;
    multi_accept on;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;
    client_max_body_size 10m;

    # WebSocket连接升级映射
    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # 服务端
    server {
        listen       80;
        server_name  "";
        client_max_body_size 100M;

        # ── Python AI Service (aiwear-python:5001) ──
        # Health check
        location ^~ /api/health {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Chat (Agent conversation)
        location ^~ /api/chat {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 120s;
            proxy_buffering off;
        }

        # SSE chat stream
        location ^~ /api/agent/chat/stream {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # RAG knowledge search
        location ^~ /api/rag/ {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # MCP tools status
        location ^~ /api/mcp/ {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Trace & session stats
        location ^~ /api/traces {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location ^~ /api/session-stats {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Image tools (async generate, status poll)
        location ^~ /api/tool/image/ {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 30s;
        }

        # Wardrobe list (Python)
        location ^~ /api/wardrobe/ {
            proxy_pass http://aiwear-python:5001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Java Spring Boot (aiwear-java:8081) ──
        # Remainder API: file upload, auth, records, user profile
        location ^~ /api/ {
            proxy_pass http://aiwear-java:8081;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 静态文件服务 - 前端应用
        location / {
            root   /data/bite_wear/web/dist;
            try_files $uri $uri/ /index.html;
            index  index.html index.htm;
        }
    }
}
